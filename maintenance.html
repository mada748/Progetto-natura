<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - Progetto Natura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-primary: #2d5a3d;
      --color-primary-light: #3d7a52;
      --color-background: #f8faf8;
      --color-surface: #ffffff;
      --color-text: #1a2e1a;
      --color-text-muted: #4a5a4a;
      --color-border: #d4e4d4;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-background);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .maintenance-container {
      max-width: 600px;
      text-align: center;
      background-color: var(--color-surface);
      padding: 3rem 2rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background-color: var(--color-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      color: white;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.125rem;
      line-height: 1.7;
      color: var(--color-text-muted);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background-color: var(--color-border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-bar-fill {
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
      border-radius: 3px;
      animation: progress 2s ease-in-out infinite;
    }

    @keyframes progress {
      0%, 100% { width: 30%; }
      50% { width: 70%; }
    }

    .contact-info {
      background-color: var(--color-background);
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      margin-top: 1.5rem;
    }

    .contact-info p {
      font-size: 0.9375rem;
      margin-bottom: 0.5rem;
    }

    .contact-info a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .contact-info a:hover {
      text-decoration: underline;
    }

    .footer-text {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <main class="maintenance-container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
    </div>
    
    <h1>Under Maintenance</h1>
    <p>We are working to improve the site.</p>
    <p class="subtitle">We will be back online soon with new features!</p>
    
    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>
    
    <div class="contact-info">
      <p>For information, contact us:</p>
      <a href="mailto:progetto.natura.info@gmail.com">progetto.natura.info@gmail.com</a>
    </div>
    
    <p class="footer-text">Thank you for your patience!</p>
  </main>
</body>
</html>
