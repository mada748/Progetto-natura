<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .status-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    
    .status-iframe {
      border: none;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      max-width: 100%;
    }
    
    .refresh-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      background-color: var(--color-primary, #2d5a3d);
      color: white;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      transition: background-color 150ms ease;
    }
    
    .refresh-button:hover {
      background-color: var(--color-primary-light, #3d7a52);
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <nav class="nav" role="navigation">
      <a href="index.html">Torna alla homepage</a>
    </nav>

    <main>
      <section class="container">
        <h1>Status</h1>
        <div class="status-wrapper">
          <iframe 
            src="https://cyrgrlq6.checkly-dashboards.com/?duration=7d" 
            width="380" 
            height="560" 
            id="Status"
            class="status-iframe"
            title="Service status dashboard"
          ></iframe>
          <button onclick="refreshIframe()" class="refresh-button">Refresh</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    function refreshIframe() {
      const iframe = document.getElementById('Status');
      iframe.src = iframe.src;
    }
  </script>
</body>
</html>
